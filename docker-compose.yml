services:
  theprice-site:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        API_BASE_URL: ${API_BASE_URL}
    image: theprice-landing-page
    container_name: theprice-landing-page
    ports:
      - "80:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    labels:
      - "com.noartcode.project=theprice"
      - "com.noartcode.environment=production"

networks:
  testers-admin-network:
    name: testers-admin-network